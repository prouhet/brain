<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#F7F8FC">
  <title>ReelCall -- Sign Up Free</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --acc: #E5001C; --ok: #22C98A; --red: #EF4444; --warn: #F5A623;
      --bg: #F7F8FC; --card: #FFFFFF; --border: rgba(0,0,0,.08);
      --ink: #0A0C10; --t2: #5A6478; --t3: #9BA3B5;
      --s2: rgba(0,0,0,.04);
    }
    html, body { min-height: 100vh; font-family: 'Figtree', sans-serif; font-size: 15px; background: var(--bg); color: var(--ink); }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 20px; position: relative; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(229,0,28,.06) 0%, transparent 70%); pointer-events: none; }

    .brand { text-align: center; margin-bottom: 28px; }
    .brand a { text-decoration: none; }
    .logo { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -.5px; color: var(--ink); }
    .logo span { color: var(--acc); }
    .tagline { font-size: 14px; color: var(--t2); margin-top: 6px; }
    .tagline a { color: var(--acc); text-decoration: none; }
    .tagline a:hover { text-decoration: underline; }

    .trial-badge { background: rgba(229,0,28,.08); border: 1px solid rgba(229,0,28,.18); border-radius: 12px; padding: 14px 20px; margin-bottom: 24px; text-align: center; width: 100%; max-width: 400px; }
    .trial-badge strong { display: block; font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--acc); margin-bottom: 4px; }
    .trial-badge span { font-size: 13px; color: var(--t2); }

    .card { width: 100%; max-width: 400px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 36px 32px; box-shadow: 0 4px 24px rgba(0,0,0,.06); }

    .tabs { display: flex; gap: 0; margin-bottom: 24px; background: var(--s2); border-radius: 10px; padding: 4px; }
    .tab { flex: 1; padding: 9px; text-align: center; font-size: 14px; font-weight: 500; border-radius: 8px; cursor: pointer; transition: all .15s; color: var(--t2); border: none; background: transparent; font-family: 'Figtree', sans-serif; }
    .tab.active { background: var(--acc); color: #fff; font-weight: 600; }

    label { display: block; font-size: 12px; font-weight: 600; color: var(--t2); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; margin-top: 16px; }
    input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--ink); border-radius: 8px; padding: 11px 14px; font-size: 14px; outline: none; font-family: 'Figtree', sans-serif; transition: border-color .15s; }
    input:focus { border-color: var(--acc); box-shadow: 0 0 0 3px rgba(229,0,28,.1); }
    input::placeholder { color: var(--t3); }

    .btn { width: 100%; margin-top: 20px; padding: 13px; background: var(--acc); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'Figtree', sans-serif; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn:hover:not(:disabled) { background: #C4001A; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(229,0,28,.3); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

    .msg { margin-top: 14px; padding: 12px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; }
    .msg.err { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2); color: var(--red); }
    .msg.ok { background: rgba(34,201,138,.08); border: 1px solid rgba(34,201,138,.2); color: var(--ok); }

    .forgot { display: block; text-align: right; margin-top: 6px; font-size: 13px; color: var(--acc); background: none; border: none; cursor: pointer; font-family: 'Figtree', sans-serif; }
    .forgot:hover { text-decoration: underline; }

    .spin { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-note { margin-top: 20px; font-size: 13px; color: var(--t3); text-align: center; max-width: 400px; }
    .footer-note a { color: var(--acc); text-decoration: none; }

    @media (max-width: 440px) { .card { padding: 28px 20px; } }
  </style>
</head>
<body>
  <div class="brand">
    <a href="/index.html"><img src="/reelcall-logo-big.png" alt="ReelCall" style="height:120px;width:auto;max-width:380px;display:block;margin:0 auto"></a>
    <p class="tagline">Stop Rewatching. Start Knowing. &middot; <a href="/index.html">Learn more &rarr;</a></p>
  </div>

  <div class="trial-badge">
    <strong>30 Free Videos · 60 Days</strong>
    <span>No credit card needed &middot; Cancel anytime</span>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-signup" onclick="showTab('signup')">Create Account</button>
      <button class="tab" id="tab-login" onclick="showTab('login')">Sign In</button>
    </div>

    <div id="form-signup">
      <label>Email</label>
      <input type="email" id="su-email" placeholder="you@example.com" autocomplete="email">
      <label>Username</label>
      <input type="text" id="su-username" placeholder="e.g. johndoe (letters, numbers, _)" autocomplete="off" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_]/g,'')">
      <label>Password</label>
      <div style="position:relative">
        <input type="password" id="su-pass" placeholder="Min 6 characters" autocomplete="new-password" style="width:100%;padding-right:44px;box-sizing:border-box">
        <button type="button" onclick="togglePw('su-pass',this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--t2);font-size:16px;padding:4px">👁</button>
      </div>
      <button class="btn" id="btn-signup" onclick="doSignup()">Start Free — 30 Videos, 60 Days</button>
      <div id="msg-signup"></div>
    </div>

    <div id="form-login" style="display:none">
      <label>Email</label>
      <input type="email" id="li-email" placeholder="you@example.com" autocomplete="email">
      <label>Password</label>
      <div style="position:relative">
        <input type="password" id="li-pass" placeholder="Your password" autocomplete="current-password" style="width:100%;padding-right:44px;box-sizing:border-box">
        <button type="button" onclick="togglePw('li-pass',this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--t2);font-size:16px;padding:4px">👁</button>
      </div>
      <button class="forgot" onclick="doForgot()" title="Enter your email above first">Forgot password?</button>
      <button class="btn" id="btn-login" onclick="doLogin()">Sign In</button>
      <div id="msg-login"></div>
    </div>
  </div>

  <p class="footer-note">
    By signing up you agree to our <a href="/terms.html" style="color:var(--acc)">Terms of Service</a> and <a href="/privacy.html" style="color:var(--acc)">Privacy Policy</a>.
  </p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SB_URL = "https://rzkrydqtgmuyeaipronh.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6a3J5ZHF0Z211eWVhaXByb25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MzE1NDksImV4cCI6MjA5MDQwNzU0OX0.YFSnanaiB_TJrAmlWN1ziARjajLaeT7kMrJT2TlkTy4";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    sb.auth.getSession().then(({ data: { session } }) => {
      if (session?.user?.id) {
        // Verify session is actually valid by checking user
        sb.auth.getUser().then(({ data: { user }, error }) => {
          if (user && !error) {
            const returnTo = sessionStorage.getItem("reelcall_return_to");
            sessionStorage.removeItem("reelcall_return_to");
            window.location.href = returnTo || "/reel.html";
          } else {
            // Invalid session — clear it
            sb.auth.signOut();
          }
        });
      }
    });

    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      if (inp.type === "password") { inp.type = "text"; btn.textContent = "🙈"; }
      else { inp.type = "password"; btn.textContent = "👁"; }
    }

    function showTab(t) {
      document.getElementById("form-signup").style.display = t === "signup" ? "" : "none";
      document.getElementById("form-login").style.display = t === "login" ? "" : "none";
      document.getElementById("tab-signup").className = "tab" + (t === "signup" ? " active" : "");
      document.getElementById("tab-login").className = "tab" + (t === "login" ? " active" : "");
    }

    function setMsg(id, text, type) {
      const el = document.getElementById(id);
      el.className = "msg " + type;
      el.textContent = text;
    }

    function setBtnLoading(id, loading) {
      const btn = document.getElementById(id);
      btn.disabled = loading;
      if (id === "btn-signup") {
        btn.innerHTML = loading ? '<div class="spin"></div>' : 'Start Free — 30 Videos, 60 Days';
      } else {
        btn.innerHTML = loading ? '<div class="spin"></div>' : 'Sign In';
      }
    }

    async function doSignup() {
      const email = document.getElementById("su-email").value.trim();
      const pass = document.getElementById("su-pass").value;
      const usernameInput = document.getElementById("su-username").value.trim();

      if (!email || !pass) { setMsg("msg-signup", "Please fill in all fields.", "err"); return; }
      if (!usernameInput || usernameInput.length < 3) { setMsg("msg-signup", "Please choose a username — at least 3 characters.", "err"); return; }
      if (usernameInput.length > 20) { setMsg("msg-signup", "Username must be 20 characters or less.", "err"); return; }

      // Validate coupon code if entered
      const couponInput = (document.getElementById("coupon-code")?.value || "").trim().toUpperCase();
      let couponData = null;
      if (couponInput) {
        const { data: coupon, error: cErr } = await sb.from("coupon_codes")
          .select("*").eq("code", couponInput).eq("active", true).maybeSingle();
        if (cErr || !coupon) {
          setMsg("msg-signup", "That coupon code isn't valid — double-check and try again.", "err");
          setBtnLoading("btn-signup", false); return;
        }
        if (coupon.max_uses && coupon.uses_count >= coupon.max_uses) {
          setMsg("msg-signup", "That coupon code is fully redeemed — no spots left.", "err");
          setBtnLoading("btn-signup", false); return;
        }
        couponData = coupon;
        const msgEl = document.getElementById("coupon-msg");
        if (msgEl) msgEl.textContent = `✓ ${coupon.description || "Discount applied"}`;
      }

      setBtnLoading("btn-signup", true);
      try {
        // Check username is available
        const { data: existing } = await sb.from("reel_users").select("id").eq("owner", usernameInput).maybeSingle();
        if (existing) { setMsg("msg-signup", "That username is already taken — try another.", "err"); setBtnLoading("btn-signup", false); return; }

        const { data, error } = await sb.auth.signUp({ email, password: pass });
        if (error) throw error;
        const owner = usernameInput;
        const qaExpiresAt = new Date(Date.now() + 60 * 24 * 60 * 60 * 1000).toISOString();
        const referredBy = sessionStorage.getItem("reelcall_referred_by") || null;
        const referredVideo = sessionStorage.getItem("reelcall_referred_video") || null;
        await sb.from("reel_users").insert({
          id: data.user.id, email, owner,
          trial_ends_at: qaExpiresAt, qa_expires_at: qaExpiresAt,
          active: true, videos_capacity: 30,
          referred_by: referredBy,
          coupon_used: couponData?.code || null,
        });
        // Increment coupon uses
        if (couponData) {
          await sb.from("coupon_codes").update({ uses_count: (couponData.uses_count || 0) + 1 }).eq("id", couponData.id);
        }
        // Credit referrer if exists
        if (referredBy) {
          try {
            // Grant referrer +15 videos +15 days
            const action = `referral_${owner}`;
            await sb.from("reelcall_rewards").insert({ owner: referredBy, action, videos_earned: 15, days_earned: 15 });
            const p = await sb.from("reel_users").select("videos_capacity, qa_expires_at").eq("owner", referredBy).single();
            if (p.data) {
              const newCap = (p.data.videos_capacity || 10) + 15;
              const base = new Date(Math.max(new Date(p.data.qa_expires_at || Date.now()), Date.now()));
              const newExpiry = new Date(base.getTime() + 15 * 86400000).toISOString();
              await sb.from("reel_users").update({ videos_capacity: newCap, qa_expires_at: newExpiry }).eq("owner", referredBy);
            }
            // Mark share view with signup
            if (referredVideo) {
              await sb.from("reel_share_views").update({ signed_up_as: owner }).eq("video_id", referredVideo).eq("owner", referredBy).is("signed_up_as", null);
            }
          } catch(e) { console.log("referral credit error", e); }
          sessionStorage.removeItem("reelcall_referred_by");
          sessionStorage.removeItem("reelcall_referred_video");
        }
        document.getElementById("form-signup").innerHTML = `
          <div style="text-align:center;padding:8px 0">
            <div style="font-size:40px;margin-bottom:16px">🎉</div>
            <h3 style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--ink);margin-bottom:10px">You're in!</h3>
            <p style="font-size:14px;color:var(--t2);line-height:1.7;margin-bottom:20px">
              Your account is ready. Taking you to your library now...
            </p>
          </div>
        `;
        // Pass session tokens explicitly so reel.html can set session directly
        const { data: { session: sess } } = await sb.auth.getSession();
        if (sess) {
          window.location.href = "/guide.html?new=1";
        } else {
          const returnTo = sessionStorage.getItem("reelcall_return_to");
          sessionStorage.removeItem("reelcall_return_to");
          window.location.href = returnTo || "/guide.html?new=1";
        }
      } catch (e) {
        setMsg("msg-signup", e.message, "err");
        setBtnLoading("btn-signup", false);
      }
    }

    async function doLogin() {
      const email = document.getElementById("li-email").value.trim();
      const pass = document.getElementById("li-pass").value;
      if (!email || !pass) { setMsg("msg-login", "Please fill in all fields.", "err"); return; }
      setBtnLoading("btn-login", true);
      try {
        const { data: loginData, error } = await sb.auth.signInWithPassword({ email, password: pass });
        if (error) throw error;
        if (loginData?.session) {
          window.location.href = "/reel.html#access_token=" + loginData.session.access_token + "&refresh_token=" + loginData.session.refresh_token + "&type=login";
        } else {
          const returnTo = sessionStorage.getItem("reelcall_return_to");
        sessionStorage.removeItem("reelcall_return_to");
        window.location.href = returnTo || "/reel.html";
        }
      } catch (e) {
        setMsg("msg-login", e.message, "err");
        setBtnLoading("btn-login", false);
      }
    }

    async function doForgot() {
      const email = document.getElementById("li-email").value.trim();
      if (!email) { 
        setMsg("msg-login", "Enter your email address in the field above, then click Forgot password.", "err"); 
        document.getElementById("li-email").focus();
        return; 
      }
      const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: "https://reelcall.app/reel.html" });
      if (error) setMsg("msg-login", error.message, "err");
      else setMsg("msg-login", "✓ Password reset email sent to " + email + " — check your inbox.", "ok");
    }

    document.addEventListener("keydown", e => {
      if (e.key !== "Enter") return;
      if (document.getElementById("form-signup").style.display !== "none") doSignup();
      else doLogin();
    });
  </script>
</body>
</html>
