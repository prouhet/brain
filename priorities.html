<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d0d">
<title>Studio Strong — My Priorities</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #2b7d94; --teal-light: #3a9ab5; --teal-dim: rgba(43,125,148,0.15);
    --black: #0d0d0d; --surface: #141414; --surface2: #1c1c1c; --surface3: #242424;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --text: #e8e8e8; --text-dim: #888; --text-faint: #555;
    --april: #e8845a; --may: #e8c45a; --june: #7ec87e;
    --green: #1D9E75; --radius: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--black); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image: linear-gradient(rgba(43,125,148,0.025) 1px,transparent 1px),
                      linear-gradient(90deg,rgba(43,125,148,0.025) 1px,transparent 1px);
    background-size:40px 40px;
  }
  .wrapper { position:relative; z-index:1; max-width:780px; margin:0 auto; padding:0 20px 80px; }

  /* ── Header ── */
  header { display:flex; align-items:center; justify-content:space-between; padding:18px 0 16px; border-bottom:1px solid var(--border); margin-bottom:20px; }
  .header-left { display:flex; align-items:center; gap:12px; }
  .avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; flex-shrink:0; }
  .owner-info .name { font-size:15px; font-weight:500; }
  .owner-info .date { font-size:12px; color:var(--text-dim); margin-top:1px; }
  .header-right { display:flex; align-items:center; gap:10px; }
  #refresh-btn { font-size:12px; padding:6px 12px; border-radius:7px; border:1px solid var(--border2); background:transparent; color:var(--text-dim); cursor:pointer; font-family:inherit; transition:color 0.2s,border-color 0.2s; }
  #refresh-btn:hover { color:var(--teal-light); border-color:var(--teal); }
  #refresh-btn.spinning { color:var(--teal-light); }

  /* ── Stats chips ── */
  .stats-row { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .chip { font-size:11px; padding:4px 10px; border-radius:20px; border:1px solid var(--border); background:var(--surface2); color:var(--text-dim); font-family:'DM Mono',monospace; }
  .chip span { color:var(--teal-light); font-weight:500; }

  /* ── Toast ── */
  #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--surface3); border:1px solid var(--border2); border-radius:8px; padding:10px 16px; font-size:13px; color:var(--text); z-index:100; display:none; white-space:nowrap; }
  #toast.show { display:block; }
  #toast.success { border-color:rgba(29,158,117,0.5); color:#7ec87e; }
  #toast.error { border-color:rgba(232,132,90,0.5); color:var(--april); }

  /* ── Thinking state ── */
  .thinking { display:flex; align-items:center; gap:10px; padding:16px 0; color:var(--text-dim); font-size:13px; }
  .thinking-dots { display:flex; gap:5px; }
  .thinking-dots span { width:6px; height:6px; border-radius:50%; background:var(--teal); animation:pulse 1.2s ease-in-out infinite; }
  .thinking-dots span:nth-child(2) { animation-delay:0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay:0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
  .skeleton { background:var(--surface2); border-radius:var(--radius); padding:16px; margin-bottom:8px; }
  .skel-line { height:10px; background:var(--surface3); border-radius:4px; margin-bottom:8px; }
  .skel-line.short { width:40%; }

  /* ── Section headers ── */
  .section { margin-bottom:24px; }
  .section-head { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .section-name { font-size:11px; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; color:var(--text-dim); }
  .section-pill { font-size:10px; padding:2px 8px; border-radius:20px; font-weight:500; }
  .pill-high { background:rgba(232,132,90,0.12); color:var(--april); border:1px solid rgba(232,132,90,0.25); }
  .pill-medium { background:rgba(232,196,90,0.1); color:var(--may); border:1px solid rgba(232,196,90,0.2); }
  .pill-low { background:rgba(126,200,126,0.1); color:var(--june); border:1px solid rgba(126,200,126,0.2); }

  /* ── Task item ── */
  .task-item {
    display:flex; align-items:flex-start; gap:10px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); padding:11px 12px;
    margin-bottom:6px; transition:opacity 0.3s, border-color 0.2s;
  }
  .task-item.done { opacity:0.35; pointer-events:none; }
  .task-item:hover { border-color:var(--border2); }

  /* Checkmark button */
  .check-btn {
    width:20px; height:20px; min-width:20px; border-radius:50%;
    border:1.5px solid var(--border2); background:transparent; cursor:pointer;
    display:flex; align-items:center; justify-content:center; margin-top:1px;
    transition:background 0.15s, border-color 0.15s; flex-shrink:0;
  }
  .check-btn:hover { border-color:var(--green); }
  .check-btn svg { display:none; }
  .check-btn.checked { background:var(--green); border-color:var(--green); }
  .check-btn.checked svg { display:block; }

  /* Task body */
  .task-body { flex:1; min-width:0; }
  .task-title { font-size:13.5px; color:var(--text); line-height:1.45; }
  .task-detail { font-size:12px; color:var(--text-dim); margin-top:3px; line-height:1.4; }
  .task-due { font-size:11px; color:var(--text-faint); margin-top:4px; font-family:'DM Mono',monospace; }

  /* Tier badge */
  .tier-badge { font-size:10px; padding:2px 6px; border-radius:4px; background:var(--surface3); color:var(--text-faint); font-family:'DM Mono',monospace; flex-shrink:0; margin-top:2px; }

  /* Type pill */
  .type-pill { font-size:10px; padding:2px 7px; border-radius:20px; flex-shrink:0; margin-top:2px; white-space:nowrap; }
  .type-business { background:var(--teal-dim); color:var(--teal-light); border:1px solid rgba(43,125,148,0.25); }
  .type-personal { background:rgba(196,126,176,0.1); color:#d49ec8; border:1px solid rgba(196,126,176,0.2); }

  /* Reschedule area */
  .task-actions { display:flex; align-items:center; gap:6px; flex-shrink:0; margin-top:1px; }
  select.reschedule {
    font-size:11px; padding:3px 7px; height:24px;
    border-radius:6px; border:1px solid var(--border2);
    background:var(--surface2); color:var(--text-dim);
    cursor:pointer; font-family:'DM Sans',sans-serif;
    transition:border-color 0.15s, color 0.15s;
  }
  select.reschedule:hover { border-color:var(--teal); }
  select.reschedule.active { border-color:var(--teal); color:var(--teal-light); background:var(--teal-dim); }
  select.reschedule option, select.reschedule optgroup { background:var(--surface3); color:var(--text); }
  .move-btn {
    font-size:11px; padding:3px 9px; height:24px;
    border-radius:6px; border:1px solid var(--teal);
    background:var(--teal-dim); color:var(--teal-light);
    cursor:pointer; font-family:'DM Sans',sans-serif;
    display:none; white-space:nowrap;
    transition:background 0.15s;
  }
  .move-btn:hover { background:rgba(43,125,148,0.25); }
  .move-btn.visible { display:block; }

  /* Recurring badge */
  .recur-badge { font-size:10px; padding:2px 7px; border-radius:20px; flex-shrink:0; margin-top:2px; white-space:nowrap; background:rgba(37,99,196,0.12); color:#7aaaf0; border:1px solid rgba(37,99,196,0.25); }
  .pill-recurring { background:rgba(37,99,196,0.1); color:#7aaaf0; border:1px solid rgba(37,99,196,0.2); }
  /* Recurring checkmark — teal ring not green */
  .check-btn.recur:hover { border-color:#7aaaf0; }
  .check-btn.recur.checked { background:#2563c4; border-color:#2563c4; }
  /* Flash animation on recurring reset */
  @keyframes flash-reset { 0%{opacity:0.3} 50%{opacity:1} 100%{opacity:1} }
  .task-item.reset { animation:flash-reset 0.5s ease; }
  .no-key { text-align:center; padding:60px 20px; color:var(--text-dim); }
  .no-key h2 { font-size:18px; font-weight:500; margin-bottom:8px; color:var(--text); }
  .state-msg { text-align:center; padding:40px 20px; color:var(--text-dim); font-size:14px; }
</style>
</head>
<body>
<div class="wrapper">

  <div id="no-key" style="display:none;">
    <div class="no-key"><h2>No key in URL</h2><p>Open this page with ?key=YOUR_KEY appended to the URL.</p></div>
  </div>

  <div id="dashboard" style="display:none;">
    <header>
      <div class="header-left">
        <div class="avatar" id="owner-avatar"></div>
        <div class="owner-info">
          <div class="name" id="owner-name">Loading…</div>
          <div class="date" id="owner-date"></div>
        </div>
      </div>
      <div class="header-right">
        <button id="refresh-btn" onclick="load()">↻ Refresh</button>
      </div>
    </header>

    <div class="stats-row" id="stats-row"></div>
    <div id="toast"></div>
    <div id="main-content"><div class="state-msg">Loading…</div></div>
  </div>

</div>

<script>
const API_BASE = 'https://rzkrydqtgmuyeaipronh.supabase.co/functions/v1/brain-priorities';
const KEY = new URLSearchParams(window.location.search).get('key') || '';

const OWNER_CFG = {
  dave:   { initials:'D',  bg:'rgba(43,125,148,0.25)',   color:'#3a9ab5' },
  doreen: { initials:'Dr', bg:'rgba(196,126,176,0.2)',   color:'#d49ec8' },
};

function ownerCfg(o) {
  return OWNER_CFG[o?.toLowerCase()] || { initials:(o||'?')[0].toUpperCase(), bg:'rgba(255,255,255,0.1)', color:'#aaa' };
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  setTimeout(() => t.className = '', 3000);
}

// ── Reschedule helpers ────────────────────────────────────────
function computeDueMonth(val) {
  const now = new Date();
  const target = new Date(now);
  const dayMap = { Mon:1, Tue:2, Wed:3, Thu:4, Fri:5, Sat:6, Sun:0 };
  if (dayMap[val] !== undefined) {
    const diff = (dayMap[val] - now.getDay() + 7) % 7 || 7;
    target.setDate(now.getDate() + diff);
  } else if (val === '2w') { target.setDate(now.getDate() + 14); }
  else if (val === '3w') { target.setDate(now.getDate() + 21); }
  else if (val === '1m') { target.setMonth(now.getMonth() + 1); }
  else if (val === '2m') { target.setMonth(now.getMonth() + 2); }
  return target.toLocaleString('default', { month: 'long' }).toLowerCase();
}

const DAY_LABELS = { Mon:'Monday', Tue:'Tuesday', Wed:'Wednesday', Thu:'Thursday', Fri:'Friday' };
const VAL_LABELS = { '2w':'2 weeks', '3w':'3 weeks', '1m':'1 month', '2m':'2 months' };
function valLabel(v) { return DAY_LABELS[v] || VAL_LABELS[v] || v; }

function onSelectChange(sel, moveBtn) {
  if (sel.value) {
    sel.classList.add('active'); moveBtn.classList.add('visible');
  } else {
    sel.classList.remove('active'); moveBtn.classList.remove('visible');
  }
}

async function reschedule(id, val, titleText, rowEl) {
  const due_month = computeDueMonth(val);
  try {
    const res = await fetch(`${API_BASE}?key=${encodeURIComponent(KEY)}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, due_month }),
    });
    if (!res.ok) throw new Error('Server error');
    showToast(`Moved "${titleText.slice(0,40)}" → ${due_month.charAt(0).toUpperCase()+due_month.slice(1)}`, 'success');
    rowEl.style.opacity = '0.4';
    setTimeout(() => rowEl.remove(), 400);
  } catch {
    showToast('Failed to reschedule — try again', 'error');
  }
}

// ── Render ────────────────────────────────────────────────────
function renderData(data) {
  const cfg = ownerCfg(data.owner);
  const av = document.getElementById('owner-avatar');
  av.textContent = cfg.initials;
  av.style.background = cfg.bg;
  av.style.color = cfg.color;

  document.getElementById('owner-name').textContent =
    data.owner ? data.owner.charAt(0).toUpperCase() + data.owner.slice(1) + "'s Priorities" : 'Priorities';

  const ft = data.fetched_at
    ? new Date(data.fetched_at).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })
    : '';
  document.getElementById('owner-date').textContent =
    new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' }) +
    (ft ? ` · fetched ${ft}` : '');

  document.getElementById('stats-row').innerHTML = [
    `<span class="chip">business <span>${data.business_count || 0}</span></span>`,
    `<span class="chip">personal <span>${data.personal_count || 0}</span></span>`,
    data.recurring_count ? `<span class="chip">recurring <span>${data.recurring_count}</span></span>` : '',
  ].join('');

  const sections = data.synthesized || [];
  if (!sections.length) {
    document.getElementById('main-content').innerHTML =
      '<div class="state-msg">No tasks found in the brain.</div>';
    return;
  }

  let html = '';
  for (const sec of sections) {
    const isRecurSec = sec.priority === 'recurring';
    const pillClass = isRecurSec ? 'pill-recurring'
      : sec.priority === 'high' ? 'pill-high'
      : sec.priority === 'medium' ? 'pill-medium' : 'pill-low';
    const pillLabel = isRecurSec ? '⟳ recurring' : sec.priority;
    html += `<div class="section">`;
    html += `<div class="section-head">
      <span class="section-name">${esc(sec.section)}</span>
      ${sec.priority ? `<span class="section-pill ${pillClass}">${esc(pillLabel)}</span>` : ''}
    </div>`;

    for (const item of (sec.items || [])) {
      const isRecur = !!item.recurring || isRecurSec;
      const typeClass = item.type === 'personal' ? 'type-personal' : 'type-business';
      const tierLabel = item.tier ? `T${item.tier}` : '';
      const hasId = item.id && item.id.length > 10;
      const rowId = 'row-' + (item.id || Math.random().toString(36).slice(2));
      const recurLabel = isRecur ? (typeof item.recurring === 'object'
        ? `every ${item.recurring.every} ${item.recurring.unit}`
        : (item.recurring || 'recurring')) : null;

      // Store id and recur flag as data attributes — avoids apostrophe JS injection bugs
      html += `<div class="task-item" id="${esc(rowId)}" data-id="${esc(item.id||'')}" data-recur="${isRecur}">`;

      // Checkmark — reads data attrs from parent row, no title in onclick
      html += `<button class="check-btn${isRecur?' recur':''}" title="${isRecur?'Mark done (resets)':'Mark done'}"
        onclick="handleCheck('${esc(rowId)}',this)">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 3.5L3.5 6.5L9 1" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>`;

      // Body
      const detailText = item.detail && item.detail !== `⟳ ${recurLabel}` ? item.detail : '';
      html += `<div class="task-body">
        <div class="task-title">${esc(item.title)}</div>
        ${detailText ? `<div class="task-detail">${esc(detailText)}</div>` : ''}
        ${item.due && item.due !== 'no date' ? `<div class="task-due">${esc(item.due)}</div>` : ''}
      </div>`;

      // Recurring badge
      if (recurLabel) html += `<span class="recur-badge">⟳ ${esc(recurLabel)}</span>`;

      // Tier badge
      if (tierLabel) html += `<span class="tier-badge">${tierLabel}</span>`;

      // Type pill
      html += `<span class="type-pill ${typeClass}">${item.type === 'personal' ? 'personal' : 'business'}</span>`;

      // Reschedule dropdown (not shown for recurring — they repeat automatically)
      if (hasId && !isRecur) {
        const selId = 'sel-' + rowId;
        const btnId = 'btn-' + rowId;
        html += `<div class="task-actions">
          <select class="reschedule" id="${selId}" onchange="onSelectChange(this,document.getElementById('${btnId}'))">
            <option value="">Move…</option>
            <optgroup label="Day of week">
              <option value="Tue">Tuesday</option>
              <option value="Wed">Wednesday</option>
              <option value="Thu">Thursday</option>
              <option value="Fri">Friday</option>
              <option value="Mon">Next Monday</option>
            </optgroup>
            <option value="2w">2 weeks</option>
            <option value="3w">3 weeks</option>
            <option value="1m">1 month</option>
            <option value="2m">2 months</option>
          </select>
          <button class="move-btn" id="${btnId}"
            onclick="confirmMove('${esc(rowId)}','${selId}')">
            Move
          </button>
        </div>`;
      }

      html += `</div>`;
    }
    html += `</div>`;
  }

  document.getElementById('main-content').innerHTML = html;
}

function confirmMove(rowId, selId) {
  const sel = document.getElementById(selId);
  const row = document.getElementById(rowId);
  const id  = row?.dataset.id || '';
  const title = row?.querySelector('.task-title')?.textContent || '';
  if (!sel || !sel.value || !id) return;
  reschedule(id, sel.value, title, row);
  sel.value = '';
  sel.classList.remove('active');
  sel.nextElementSibling?.classList.remove('visible');
}

function handleCheck(rowId, btn) {
  const row = document.getElementById(rowId);
  const id = row?.dataset.id || '';
  const isRecur = row?.dataset.recur === 'true';
  const title = row?.querySelector('.task-title')?.textContent || '';
  btn.classList.add('checked');
  if (id && id.length > 10) {
    completeTask(id, title, row, isRecur, btn);
  } else {
    if (isRecur) { setTimeout(() => btn.classList.remove('checked'), 800); }
    else { row.classList.add('done'); }
  }
}

async function completeTask(id, titleText, rowEl, isRecur, btn) {
  try {
    const res = await fetch(`${API_BASE}?key=${encodeURIComponent(KEY)}`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id }),
    });
    if (!res.ok) throw new Error('Server error');
    const data = await res.json();

    if (data.recurring) {
      showToast('✓ Done — resets next occurrence', 'success');
      rowEl.classList.add('reset');
      setTimeout(() => {
        btn.classList.remove('checked');
        rowEl.classList.remove('reset');
      }, 600);
    } else {
      showToast(`Done: "${titleText.slice(0,40)}"`, 'success');
      rowEl.classList.add('done');
    }
  } catch {
    showToast('Failed — try again', 'error');
    btn.classList.remove('checked');
  }
}

// ── Load ──────────────────────────────────────────────────────
async function load() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning'); btn.textContent = '↻ Loading…';

  document.getElementById('main-content').innerHTML = `
    <div class="thinking">
      <div class="thinking-dots"><span></span><span></span><span></span></div>
      Claude is reading your brain…
    </div>
    ${[1,2,3].map(() => `<div class="skeleton">
      <div class="skel-line" style="width:30%"></div>
      <div class="skel-line"></div>
      <div class="skel-line short"></div>
    </div>`).join('')}`;

  try {
    const res = await fetch(`${API_BASE}?key=${encodeURIComponent(KEY)}`);
    if (res.status === 401) { showError('Invalid key in URL.'); return; }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderData(data);
  } catch(e) {
    showError(e.message);
  } finally {
    btn.classList.remove('spinning'); btn.textContent = '↻ Refresh';
  }
}

function showError(msg) {
  document.getElementById('main-content').innerHTML =
    `<div class="state-msg" style="color:#e8845a;">⚠ ${esc(msg)}</div>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

window.addEventListener('DOMContentLoaded', () => {
  if (!KEY) { document.getElementById('no-key').style.display='block'; return; }
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('owner-date').textContent =
    new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  load();
  setInterval(load, 15 * 60 * 1000); // auto-refresh every 15 min
});
</script>
</body>
</html>
