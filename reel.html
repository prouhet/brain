      const ps = video.pointStatus?.length === video.keyPoints?.length ? video.pointStatus : (video.keyPoints || []).map(() => null);
      const interestingCount = ps.filter((s) => s === "interesting").length;

      async function updatePoint(idx, val) {
        const next = [...ps]; next[idx] = next[idx] === val ? null : val;
        const updated = { ...video, pointStatus: next }; onUpdate(updated);
        await sbPatch(video.id, { point_status: next });
      }

      async function askQuestion() {
        const q = qaInput.trim(); if (!q || qaLoading) return;
        setQaInput(""); setQaLoading(true);
        const withUser = [...(video.qa || []), { id: genId(), role: "user", content: q }];

        try {
          const data = await callClaude({
            system: `You are helping Dave understand a YouTube video.\nVideo: "${video.title}" by ${video.channel}\n${video.url ? `URL: ${video.url}\n` : ""}\nSummary: ${video.summary}\n\nKey Points:\n${(video.keyPoints || []).map((p, i) => `${i + 1}. ${p}`).join("\n")}\n\nAnswer questions using the summary and key points above as your primary source. Be concise and specific.`,
            messages: withUser.map((m) => ({ role: m.role, content: m.content })),

          });

        } catch (e) { setCaptureStatus("error"); setCaptureMsg(e.message); }

      async function captureAction(text) {

          system: `Use the capture_thought tool with these exact parameters: scope="personal", save_as="note", owner="dave". Do not use business scope. Do not save as a task.`,

      async function captureQaAnswer(answer) {
        await callClaude({

      function EditableAction({ suggestion }) {

        async function save() {

          </div>

      function QaBrainBtn({ answer }) {
        const [st, setSt] = useState("idle");

            {st === "loading" ? "..." : st === "done" ? "✓ Saved to brain" : "→ Save to brain"}
          </button>

      async function addTag() {
        const t = tagInput.trim().toLowerCase(); if (!t || (video.tags || []).includes(t)) { setTagInput(""); return; }
        const newTags = [...(video.tags || []), t]; onUpdate({ ...video, tags: newTags }); setTagInput("");
        await sbPatch(video.id, { tags: newTags });

      return (

              <ShareBtn video={video} onUpdate={onUpdate} />

          </div>

          <div className="rcard rfade" style={{ marginBottom: 14, overflow: "hidden" }}>
            {video.videoId

            }
            <div style={{ padding: "18px 20px" }}>
              <h2 style={{ fontSize: 20, fontWeight: 700, lineHeight: 1.3, marginBottom: 8 }}>{video.title}</h2>

                <span className="rmono">{fmtDate(video.dateAdded)}</span>

              </div>
            </div>
          </div>

              <p style={{ fontSize: 14, color: "var(--t2)", lineHeight: 1.7 }}>{video.whatsNew}</p>

                    <p style={{ lineHeight: 1.65, whiteSpace: "pre-wrap", fontSize: 14 }}>{m.content}</p>

            <div style={{ display: "flex", gap: 10 }}>
              <input placeholder="Ask anything about this video..." value={qaInput} onChange={(e) => setQaInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && !e.shiftKey && askQuestion()} disabled={qaLoading} />
              <button className="rbtn-p" onClick={askQuestion} disabled={qaLoading || !qaInput.trim()} style={{ flexShrink: 0, padding: "10px 18px", display: "flex", alignItems: "center", gap: 6 }}>
                {qaLoading ? <Spinner size={15} /> : "Ask"}

          {BRAIN_MCP && (
          <Sec title="Capture to Brain" subtitle="Personal scope — notes or tasks from this video">

                    {t === "note" ? "📝 Note" : "✅ Task"}

              </div>
              <button className="rbtn-ok" onClick={captureContent} disabled={captureStatus === "loading" || !captureText.trim()} style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 6 }}>

              </button>

          </Sec>
          )}

    // ─── Cross-Query ───────────────────────────────────────────────────────────
    function CrossQueryView({ videos, onBack }) {
      const [selected, setSelected] = useState(new Set(videos.map((v) => v.id)));
      const [filterChannel, setFilterChannel] = useState(null);
      const [filterTag, setFilterTag] = useState(null);
      const [query, setQuery] = useState("");
      const [qa, setQa] = useState([]);
      const [loading, setLoading] = useState(false);
      const [captureStatus, setCaptureStatus] = useState("idle");
      const [queryId] = useState(() => genId()); // stable ID for this session
      const qaEndRef = useRef(null);

      const allChannels = [...new Set(videos.map((v) => v.channel).filter(Boolean))].sort();
      const allTags = [...new Set(videos.flatMap((v) => v.tags || []))].sort();

      // Filtered list shown in picker
      const visible = videos.filter((v) =>
        (!filterChannel || v.channel === filterChannel) &&
        (!filterTag || (v.tags || []).includes(filterTag))
      );

      // When filter changes, auto-select all visible
      useEffect(() => {
        setSelected(new Set(visible.map((v) => v.id)));
      }, [filterChannel, filterTag]);

      const scoped = videos.filter((v) => selected.has(v.id));

      function toggleVideo(id) {
        const next = new Set(selected);
        next.has(id) ? next.delete(id) : next.add(id);
        setSelected(next);
      }

      function toggleAll() {
        if (visible.every((v) => selected.has(v.id))) {
          const next = new Set(selected);
          visible.forEach((v) => next.delete(v.id));
          setSelected(next);
        } else {
          const next = new Set(selected);
          visible.forEach((v) => next.add(v.id));
          setSelected(next);
        }
      }

      useEffect(() => { qaEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [qa.length]);

      async function ask() {
        const q = query.trim();
        if (!q || loading || !scoped.length) return;
        setQuery(""); setLoading(true);
        const withUser = [...qa, { id: genId(), role: "user", content: q }];
        setQa(withUser);
        try {
          const ctx = scoped.map((v, i) =>
            `[${i + 1}] "${v.title}" — ${v.channel || "unknown"}\nSummary: ${v.summary}\nKey Points: ${(v.keyPoints || []).join("; ")}`
          ).join("\n\n---\n\n");

          const data = await callClaude({
            system: `You are a YouTube knowledge base assistant. You have access to ${scoped.length} video${scoped.length !== 1 ? "s" : ""} selected by the user.

${ctx}

Instructions:
- Identify which videos are most relevant — do not use videos that aren't relevant
- Synthesize insights into a clear, direct answer
- Cite video titles in brackets e.g. ["Video Title"] when referencing content
- If no videos address the question, say so and suggest what to search for
- Keep answers focused and actionable`,
            messages: withUser.map((m) => ({ role: m.role, content: m.content })),
            maxTokens: 1500,
          });
          const newQa = [...withUser, { id: genId(), role: "assistant", content: getText(data) }];
          setQa(newQa);
          // Auto-save session to reel_queries (upsert by queryId)
          try {
            await sbReq(`reel_queries?id=eq.${queryId}`, { method: "DELETE" });
            await sbSaveQuery({ id: queryId, owner: OWNER, video_ids: scoped.map((v) => v.id), video_titles: scoped.map((v) => v.title), qa: newQa });
          } catch { /* silent */ }
        } catch (e) {
          setQa([...withUser, { id: genId(), role: "assistant", content: `Error: ${e.message}` }]);
        } finally { setLoading(false); }
      }

      async function captureTooBrain() {
        if (!qa.length) return;
        setCaptureStatus("loading");
        const lastPair = qa.slice(-2);
        const content = lastPair.map((m) => `${m.role === "user" ? "Q" : "A"}: ${m.content}`).join("\n\n");
        try {
          await callClaude({
            system: `Capture for owner "dave" (personal scope) as a note using capture_thought.`,
            messages: [{ role: "user", content: `REEL cross-query note (scope personal, owner dave):\n\n${content}` }],
            maxTokens: 400, mcp: BRAIN_MCP,
          });
          setCaptureStatus("done"); setTimeout(() => setCaptureStatus("idle"), 3000);
        } catch { setCaptureStatus("error"); }
      }

    // ─── Shared Video View ────────────────────────────────────────────────────
    function SharedVideoView({ videoId }) {
      const [video, setVideo] = useState(null);
      const [qaInput, setQaInput] = useState("");
      const [qa, setQa] = useState([]);
      const [qaLoading, setQaLoading] = useState(false);
      const [err, setErr] = useState("");
      const [dark, setDark] = useState(() => localStorage.getItem("reel-theme") === "dark");
      const [authUser, setAuthUser] = useState(null); // null = not logged in, object = logged in
      const [saving, setSaving] = useState(false);
      const [saved, setSaved] = useState(false);
      const qaEndRef = useRef(null);

      useEffect(() => {
        document.body.style.background = dark ? "#07090F" : "#F8F9FC";
        localStorage.setItem("reel-theme", dark ? "dark" : "light");
      }, [dark]);

      useEffect(() => { qaEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [qa.length]);

      useEffect(() => {
        // Check auth session
        sbAuth.auth.getSession().then(({ data: { session } }) => {
          if (session) setAuthUser(session.user);
        });
        // Load shared video
        sbReq(`youtube_videos?select=*&id=eq.${videoId}&shared=eq.true`)
          .then((rows) => {
            if (!rows?.length) setErr("This video hasn't been shared or the link is invalid.");
            else setVideo(fromDb(rows[0]));
          })
          .catch((e) => setErr(e.message));
      }, [videoId]);

      async function saveToLibrary() {
        if (!authUser || !video) return;
        setSaving(true);
        try {
          // Get user's owner value
          const { data: profile } = await sbAuth.from("reel_users").select("owner").eq("id", authUser.id).single();
          if (!profile?.owner) throw new Error("Profile not found");
          // Check not already saved
          const existing = await sbReq(`youtube_videos?select=id&owner=eq.${profile.owner}&video_id=eq.${video.videoId || "none"}`);
          if (existing?.length) { setSaved(true); setSaving(false); return; }
          // Save a copy to their library including current Q&A
          const copy = { ...video, id: genId(), owner: profile.owner, shared: false, qa: qa, dateAdded: new Date().toISOString() };
          await sbInsert({ ...toDb(copy), owner: profile.owner });
          setSaved(true);
        } catch (e) { console.error(e); }
        finally { setSaving(false); }
      }

      async function askQuestion() {
        const q = qaInput.trim(); if (!q || qaLoading) return;
        setQaInput(""); setQaLoading(true);
        const withUser = [...qa, { id: genId(), role: "user", content: q }];
        setQa(withUser);
        try {
          const data = await callClaude({
            system: `You are helping someone understand a YouTube video.\nVideo: "${video.title}" by ${video.channel}\n\nSummary: ${video.summary}\n\nKey Points:\n${(video.keyPoints || []).map((p, i) => `${i + 1}. ${p}`).join("\n")}\n\nAnswer using the summary and key points. Be concise and specific.`,
            messages: withUser.map((m) => ({ role: m.role, content: m.content })),
            maxTokens: 1000,
          });
          setQa([...withUser, { id: genId(), role: "assistant", content: getText(data) }]);
        } catch (e) {
          setQa([...withUser, { id: genId(), role: "assistant", content: `Error: ${e.message}` }]);
        } finally { setQaLoading(false); }
      }

      if (err) return (
        <div className={`reel${dark ? " dark" : ""}`} style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh" }}>
          <p style={{ color: "var(--red)", fontSize: 15 }}>{err}</p>
        </div>
      );

      if (!video) return (
        <div className={`reel${dark ? " dark" : ""}`} style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", gap: 12, color: "var(--t2)" }}>
          <Spinner size={20} /> Loading shared video...

      return (

                  <span style={{ fontSize: 18 }}>✓</span>
                  <div>
                    <p style={{ fontSize: 14, fontWeight: 600, color: "var(--ok)" }}>Saved to your library!</p>
                    <a href="/reel.html" style={{ fontSize: 13, color: "var(--acc)", textDecoration: "none" }}>Open your library →</a>
                  </div>
                </div>
              ) : authUser ? (
                <div style={{ background: "var(--acc-lo)", border: "1px solid var(--acc-mid)", borderRadius: 12, padding: "14px 20px", marginBottom: mb, marginTop: mt, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
                  <div>
                    <p style={{ fontSize: 14, fontWeight: 600, color: "var(--acc)" }}>Save this to your library</p>
                    <p style={{ fontSize: 12, color: "var(--t2)", marginTop: 2 }}>Keep this video and your Q&A in your ReelCall library</p>
                  </div>
                  <button onClick={saveToLibrary} disabled={saving} style={{ flexShrink: 0, background: "var(--acc)", color: "#fff", border: "none", borderRadius: 8, padding: "9px 18px", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "Figtree,system-ui", whiteSpace: "nowrap" }}>
                    {saving ? "Saving..." : "Save to Library"}
                  </button>
                </div>
              ) : (

                  <div>
                    <p style={{ fontSize: 15, fontWeight: 700, color: "var(--text)", marginBottom: 4 }}>Save this video to your library</p>

            <Sec title="Summary" accent>

            .then((rows) => setVideos((rows || []).map(fromDb)))

          <div style={{ fontFamily: "Syne,sans-serif", fontSize: 28, fontWeight: 800, color: "#fff" }}>ReelCall.app</div>
          <p style={{ color: "#FBB040", fontSize: 15, maxWidth: 320 }}>Your 60-day trial has ended. Contact us to lock in $1/month.</p>
          <a href="mailto:studiostrongfit@gmail.com" style={{ background: "#4B8BF5", color: "#fff", padding: "12px 28px", borderRadius: 10, textDecoration: "none", fontWeight: 600, fontSize: 15 }}>Get Access</a>
        </div>
      );

      if (authState === "inactive") return (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", background: "#07090F", flexDirection: "column", gap: 16, padding: 20, textAlign: "center" }}>
          <div style={{ fontFamily: "Syne,sans-serif", fontSize: 28, fontWeight: 800, color: "#fff" }}>ReelCall.app</div>
          <p style={{ color: "#F07070", fontSize: 15 }}>Your account has been deactivated. Contact us for help.</p>
        </div>
      );

      if (loadErr) return (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", background: dark ? "#07090F" : "#F8F9FC", color: dark ? "#F07070" : "#DC2626", fontFamily: "system-ui", textAlign: "center", padding: 40 }}>
          <div><p style={{ fontSize: 16, marginBottom: 8 }}>Failed to connect</p><p style={{ fontSize: 13, opacity: .7 }}>{loadErr}</p></div>
        </div>
      );

      return (
        <div className={`reel${dark ? " dark" : ""}`}>
          <div style={{ position: "fixed", bottom: 20, right: 20, zIndex: 998, display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4 }}>
            {TRIAL_DAYS_LEFT !== null && (
              <div style={{ fontSize: 11, background: TRIAL_DAYS_LEFT <= 7 ? "rgba(251,176,64,.15)" : "rgba(52,211,153,.1)", color: TRIAL_DAYS_LEFT <= 7 ? "var(--warn)" : "var(--ok)", border: `1px solid ${TRIAL_DAYS_LEFT <= 7 ? "rgba(251,176,64,.3)" : "rgba(52,211,153,.25)"}`, borderRadius: 6, padding: "3px 8px", fontWeight: 600 }}>
                {TRIAL_DAYS_LEFT}d trial left
              </div>
            )}
            <div style={{ fontSize: 11, fontWeight: 600, color: "var(--t3)", textTransform: "uppercase", letterSpacing: ".06em", background: "var(--s2)", border: "1px solid var(--b)", borderRadius: 6, padding: "3px 8px" }}>
              {OWNER}
            </div>
          </div>
          {view !== "library" && (
            <button className="theme-btn" onClick={() => setDark(!dark)} title={dark ? "Light mode" : "Dark mode"}>
              {dark ? "☀" : "🌙"}
            </button>
          )}
          {view === "library" && <LibraryView videos={videos} onSelect={(v) => { setSelected(v); setView("detail"); }} onDelete={removeVideo} onAddNew={(url) => { setPrefillUrl(url || ""); setView("add"); }} onCrossQuery={() => setView("query")} onPaste={() => setView("paste")} dark={dark} onToggleDark={() => setDark(!dark)} />}
          {view === "add" && <AddVideoView onSave={(v) => { upsertVideo(v); setSelected(v); setView("detail"); }} onBack={() => setView("library")} existingVideos={videos} prefillUrl={prefillUrl} />}
          {view === "paste" && <PasteTranscriptView onSave={(v) => { upsertVideo(v); setSelected(v); setView("detail"); }} onBack={() => setView("library")} existingVideos={videos} />}
          {view === "detail" && currentVideo && <VideoDetailView video={currentVideo} onUpdate={upsertVideo} onDelete={async () => { await removeVideo(selected.id); setSelected(null); setView("library"); }} onBack={() => setView("library")} />}
          {view === "query" && <CrossQueryView videos={videos} onBack={() => setView("library")} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
