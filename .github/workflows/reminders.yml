name: Rosi Reminders

# Checks rosi_reminders in Supabase every hour and sends email via Postmark.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   SUPABASE_ANON_KEY   the anon/public JWT key from Supabase → Settings → API
#   EMAIL_TO            prouhet@gmail.com,rprouhet@gmail.com
#   POSTMARK_TOKEN      Postmark Server API Token
#   POSTMARK_FROM       connect@reformed.fit

on:
  schedule:
    - cron: '0 * * * *'   # top of every hour
  workflow_dispatch:       # run manually from Actions tab to test

jobs:
  reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check and send reminders
        run: python scripts/send_reminders.py
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
          POSTMARK_TOKEN:    ${{ secrets.POSTMARK_TOKEN }}
          POSTMARK_FROM:     ${{ secrets.POSTMARK_FROM }}
