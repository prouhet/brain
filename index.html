<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d0d">
<title>Studio Strong Brain</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black:#f7f9fc; --surface:#ffffff; --surface2:#f0f4f8; --surface3:#e4eaf0;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.15);
  --text:#1a1a1a; --text-dim:#555; --text-faint:#999;
  --teal:#2b7d94; --teal-light:#3a9ab5; --teal-dim:rgba(43,125,148,0.12);
  --green:#1a8a62; --green-dim:rgba(26,138,98,0.1);
  --amber:#a07a0a; --amber-dim:rgba(160,122,10,0.1);
  --purple:#6a4caf; --purple-dim:rgba(106,76,175,0.1);
  --blue:#2563c4; --blue-dim:rgba(37,99,196,0.1);
  --grid-line:rgba(43,125,148,0.12); --grid-size:28px;
  --radius:12px;
}
body.dark {
  --black:#0d0d0d; --surface:#151515; --surface2:#1e1e1e; --surface3:#272727;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text:#e8e8e8; --text-dim:#888; --text-faint:#555;
  --teal-dim:rgba(43,125,148,0.15);
  --green:#1D9E75; --green-dim:rgba(29,158,117,0.12);
  --amber:#d4a017; --amber-dim:rgba(212,160,23,0.12);
  --purple:#7c5cbf; --purple-dim:rgba(124,92,191,0.12);
  --blue-dim:rgba(37,99,196,0.12);
  --grid-line:rgba(43,125,148,0.025); --grid-size:44px;
}
#theme-btn{font-size:16px;width:32px;height:32px;border-radius:8px;border:1px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s}
#theme-btn:hover{background:var(--surface2)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--black);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
  background-size:var(--grid-size) var(--grid-size)}
.wrapper{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:24px 20px 48px;width:100%}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;border-radius:8px;background:var(--teal-dim);border:1px solid rgba(43,125,148,0.3);display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:16px;height:16px}
.logo-text{font-size:14px;font-weight:500}
.logo-sub{font-size:11px;color:var(--text-faint);margin-top:1px}
.scope-toggle{display:flex;gap:4px;background:var(--surface2);border-radius:8px;padding:3px;border:1px solid var(--border)}
.scope-btn{font-size:11px;padding:4px 12px;border-radius:6px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all 0.15s}
.scope-btn.active{background:var(--surface3);color:var(--text)}

/* Override indicator */
.override-indicator{font-size:11px;color:var(--teal-light);margin-bottom:10px;padding:6px 12px;background:var(--teal-dim);border-radius:6px;border:1px solid rgba(43,125,148,0.25)}

/* Row labels */
.row-label{font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-faint);margin-bottom:10px}

/* Type selector */
.type-selector{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.type-btn{border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);padding:14px 12px 12px;cursor:pointer;text-align:left;transition:all 0.15s;display:flex;flex-direction:column;gap:6px}
.type-btn:hover{border-color:var(--border2);background:var(--surface2)}
.type-btn[data-type="observation"].active{border-color:rgba(124,92,191,0.6);background:var(--purple-dim);box-shadow:0 0 0 1px rgba(124,92,191,0.2)}
.type-btn[data-type="observation"] .type-icon{color:#7c5cbf}
.type-btn[data-type="observation"].active .type-name{color:#a98de8}
.type-btn[data-type="note"].active{border-color:rgba(212,160,23,0.6);background:var(--amber-dim);box-shadow:0 0 0 1px rgba(212,160,23,0.2)}
.type-btn[data-type="note"] .type-icon{color:#d4a017}
.type-btn[data-type="note"].active .type-name{color:#e8c05a}
.type-btn[data-type="task"].active{border-color:rgba(29,158,117,0.6);background:var(--green-dim);box-shadow:0 0 0 1px rgba(29,158,117,0.2)}
.type-btn[data-type="task"] .type-icon{color:#1D9E75}
.type-btn[data-type="task"].active .type-name{color:#5ecba1}
.type-icon{font-size:18px;line-height:1}
.type-name{font-size:13px;font-weight:500;color:var(--text)}
.type-desc{font-size:10px;color:var(--text-faint);line-height:1.4}

/* Recurring row */
.recurring-row{margin-bottom:16px;transition:opacity 0.2s}
.recurring-row.hidden{display:none}
.recur-btns{display:flex;gap:6px;flex-wrap:wrap}
.recur-btn{font-size:12px;padding:5px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap}
.recur-btn:hover{border-color:var(--border2);color:var(--text)}
.recur-btn.active{border-color:rgba(37,99,196,0.6);background:var(--blue-dim);color:#7aaaf0;box-shadow:0 0 0 1px rgba(37,99,196,0.2)}
/* When row — tighter chips to fit all 7 days on one line */
.when-btns{gap:4px}
.when-btns .recur-btn{font-size:11px;padding:4px 7px}
.when-btns .recur-btn.today-chip{border-color:rgba(255,255,255,0.2);color:var(--text)}
/* Custom recur/when inputs */
.custom-recur{display:none;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.custom-recur.show{display:flex}
.custom-recur input[type="number"]{width:56px;padding:5px 8px;border-radius:8px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;text-align:center}
.custom-recur input[type="date"]{padding:5px 10px;border-radius:8px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;cursor:pointer;color-scheme:dark}
.custom-recur input:focus{border-color:var(--teal)}
.custom-recur select{padding:5px 10px;border-radius:8px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;cursor:pointer}
.custom-recur select option{background:var(--surface3)}
.custom-label{font-size:12px;color:var(--text-dim)}

/* Textarea */
.input-area{position:relative;margin-bottom:12px}
textarea{width:100%;min-height:120px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;padding:16px;resize:none;outline:none;transition:border-color 0.15s}
textarea:focus{border-color:var(--border2)}
textarea::placeholder{color:var(--text-faint)}

/* Controls */
.controls{display:flex;gap:10px;align-items:center}
.mic-btn{width:44px;height:44px;border-radius:50%;flex-shrink:0;background:var(--surface2);border:1.5px solid var(--border2);color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.mic-btn:hover{border-color:var(--teal);color:var(--teal-light)}
.mic-btn.recording{background:rgba(220,50,50,0.15);border-color:rgba(220,50,50,0.6);color:#e06060;animation:pulse-mic 1.2s ease-in-out infinite}
.mic-btn.processing{background:rgba(43,125,148,0.15);border-color:rgba(43,125,148,0.6);color:var(--teal-light);animation:pulse-mic 0.8s ease-in-out infinite}
@keyframes pulse-mic{0%,100%{opacity:1}50%{opacity:0.5}}
.capture-btn{flex:1;height:44px;border-radius:10px;border:none;background:var(--teal);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.capture-btn:hover{background:var(--teal-light)}
.capture-btn:active{transform:scale(0.98)}
.capture-btn:disabled{opacity:0.45;cursor:not-allowed;transform:none}

/* Toast */
.toast{margin-top:16px;padding:12px 16px;border-radius:10px;font-size:13px;line-height:1.5;display:none;border:1px solid transparent}
.toast.show{display:block}
.toast.success{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.3);color:#5ecba1}
.toast.error{background:rgba(220,80,80,0.1);border-color:rgba(220,80,80,0.3);color:#e08080}
.toast .task-list{margin-top:8px;padding-left:4px}
.toast .task-list li{color:rgba(255,255,255,0.5);font-size:12px;margin-top:4px;list-style:none;padding-left:12px;position:relative}
.toast .task-list li::before{content:'•';position:absolute;left:0;color:rgba(255,255,255,0.3)}

/* Recent */
.recent-label{font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-faint);margin:24px 0 10px}
.recent-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
.recent-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.dot-task{background:#1D9E75}.dot-note,.dot-reference{background:#d4a017}
.dot-observation{background:#7c5cbf}.dot-unknown{background:var(--text-faint)}
.recent-content{font-size:13px;color:var(--text-dim);line-height:1.4;flex:1}
.recent-meta{font-size:11px;color:var(--text-faint);margin-top:3px;font-family:'DM Mono',monospace}
</style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8" cy="8" r="3" fill="#3a9ab5"/>
          <path d="M8 2v2M8 12v2M2 8h2M12 8h2" stroke="#3a9ab5" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">Studio Strong</div>
        <div class="logo-sub">Open Brain</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark"></button>
      <div class="scope-toggle">
        <button class="scope-btn active" data-scope="business" onclick="setScope('business',this)">Business</button>
        <button class="scope-btn" data-scope="personal" onclick="setScope('personal',this)">Me</button>
      </div>
    </div>
  </div>

  <!-- Override indicator -->
  <div id="override-indicator" class="override-indicator" style="display:none;"></div>

  <!-- Type selector -->
  <div class="row-label">What are you capturing?</div>
  <div class="type-selector">
    <button class="type-btn active" data-type="observation" onclick="setType('observation',this)">
      <span class="type-icon">🧠</span>
      <span class="type-name">Observation</span>
      <span class="type-desc">Note that auto-creates tasks</span>
    </button>
    <button class="type-btn" data-type="note" onclick="setType('note',this)">
      <span class="type-icon">📋</span>
      <span class="type-name">Note</span>
      <span class="type-desc">Context or info — no tasks</span>
    </button>
    <button class="type-btn" data-type="task" onclick="setType('task',this)">
      <span class="type-icon">✓</span>
      <span class="type-name">Task</span>
      <span class="type-desc">To-do — shows in priorities</span>
    </button>
  </div>

  <!-- When row (only shows when Task selected) -->
  <div class="recurring-row hidden" id="when-row">
    <div class="row-label">When?</div>
    <div class="recur-btns when-btns" id="when-btns">
      <!-- populated dynamically based on current day of week -->
    </div>
    <div class="custom-recur" id="custom-when">
      <input type="date" id="custom-when-date" onchange="onCustomWhenChange(this)">
    </div>
  </div>

  <!-- Recurring row (only shows when Task selected) -->
  <div class="recurring-row hidden" id="recurring-row">
    <div class="row-label">Repeats?</div>
    <div class="recur-btns">
      <button class="recur-btn active" data-recur="none"    onclick="setRecur('none',this)">None</button>
      <button class="recur-btn"        data-recur="daily"   onclick="setRecur('daily',this)">Daily</button>
      <button class="recur-btn"        data-recur="weekly"  onclick="setRecur('weekly',this)">Weekly</button>
      <button class="recur-btn"        data-recur="biweekly" onclick="setRecur('biweekly',this)">Biweekly</button>
      <button class="recur-btn"        data-recur="monthly" onclick="setRecur('monthly',this)">Monthly</button>
      <button class="recur-btn"        data-recur="custom"  onclick="setRecur('custom',this)">Custom…</button>
    </div>
    <div class="custom-recur" id="custom-recur">
      <span class="custom-label">Every</span>
      <input type="number" id="custom-n" value="2" min="1" max="365">
      <select id="custom-unit">
        <option value="days">days</option>
        <option value="weeks" selected>weeks</option>
        <option value="months">months</option>
        <option value="years">years</option>
      </select>
    </div>
  </div>

  <!-- Priority row (only shows when Task selected) -->
  <div class="recurring-row hidden" id="priority-row">
    <div class="row-label">Priority (auto-assigned — override if needed)</div>
    <div class="recur-btns">
      <button class="recur-btn" data-tier="1" onclick="setTier(1,this)">T1 Opportunity</button>
      <button class="recur-btn" data-tier="2" onclick="setTier(2,this)">T2 Strategy</button>
      <button class="recur-btn" data-tier="3" onclick="setTier(3,this)">T3 Consequence</button>
      <button class="recur-btn" data-tier="4" onclick="setTier(4,this)">T4 Operations</button>
      <button class="recur-btn" data-tier="5" onclick="setTier(5,this)">T5 Maintenance</button>
    </div>
  </div>

  <!-- Category row (only shows when Task selected) -->
  <div class="recurring-row hidden" id="category-row">
    <div class="row-label">Category</div>
    <select id="category-select" style="padding:6px 12px;border-radius:8px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;cursor:pointer;width:100%">
      <option value="">Default (uncategorized)</option>
      <option value="important">⭐ Important</option>
      <option value="finance">Finance</option>
      <option value="marketing">Marketing</option>
      <option value="operations">Operations</option>
      <option value="process">Process</option>
      <option value="recruiting">Recruiting</option>
      <option value="retention">Retention</option>
      <option value="technical">Technical</option>
      <option value="automation">Automation</option>
      <option value="health">Health</option>
      <option value="home">Home</option>
    </select>
  </div>

  <!-- Text input -->
  <div class="input-area">
    <textarea id="content" placeholder="What's on your mind?"></textarea>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="Voice input">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <button class="capture-btn" id="capture-btn" onclick="capture()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/>
      </svg>
      Capture
    </button>
  </div>

  <div class="toast" id="toast"></div>

  <div class="recent-label">Recent captures</div>
  <div id="recent-list"><div style="font-size:12px;color:var(--text-faint);padding:8px 0;">Loading…</div></div>

</div>
<script>
const API_BASE = 'https://rzkrydqtgmuyeaipronh.supabase.co/functions/v1';
const KEY = new URLSearchParams(window.location.search).get('key') || '';

// ── Theme ─────────────────────────────────────────────────────
function applyTheme(dark) {
  document.body.classList.toggle('dark', dark);
  document.getElementById('theme-btn').textContent = dark ? '☀️' : '🌙';
}
function toggleTheme() {
  const isDark = document.body.classList.toggle('dark');
  localStorage.setItem('brain-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
}
applyTheme(localStorage.getItem('brain-theme') === 'dark');

let currentType     = 'observation';
let currentScope    = 'business';
let currentRecur    = 'none';
let currentWhen     = 'none';
let currentTier     = 0;
let currentCategory = '';
let mediaRecorder   = null;
let audioChunks     = [];
let isRecording     = false;

// ── Type ──────────────────────────────────────────────────────
function setType(type, btn) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const isTask = type === 'task';
  document.getElementById('when-row').classList.toggle('hidden', !isTask);
  document.getElementById('recurring-row').classList.toggle('hidden', !isTask);
  document.getElementById('priority-row').classList.toggle('hidden', !isTask);
  document.getElementById('category-row').classList.toggle('hidden', !isTask);
  if (!isTask) {
    setRecur('none', document.querySelector('.recur-btn[data-recur="none"]'));
    setWhen('none', document.querySelector('.when-btns .recur-btn[data-when="none"]'));
    document.getElementById('custom-when').classList.remove('show');
    currentTier = 0; currentCategory = '';
    document.querySelectorAll('#priority-row .recur-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('category-select').value = '';
  }
  updatePlaceholder();
}

// ── Tier override ─────────────────────────────────────────────
function setTier(tier, btn) {
  // Toggle off if already selected
  if (currentTier === tier) {
    currentTier = 0;
    document.querySelectorAll('#priority-row .recur-btn').forEach(b => b.classList.remove('active'));
  } else {
    currentTier = tier;
    document.querySelectorAll('#priority-row .recur-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
}

// ── Scope ─────────────────────────────────────────────────────
function setScope(scope, btn) {
  currentScope = scope;
  document.querySelectorAll('.scope-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.scope-btn').forEach(b => { if (b.dataset.scope === scope) b.classList.add('active'); });
}

// ── When ──────────────────────────────────────────────────────
let whenChipsData = [];

function buildWhenChips() {
  const now = new Date();
  now.setHours(12, 0, 0, 0);
  const DAY = ['Su','M','Tu','W','Th','F','Sa'];

  const chips = [{ label:'None', val:'none', isToday:false }];

  // Today + next 6 days = 7 day chips
  for (let offset = 0; offset <= 6; offset++) {
    const d = new Date(now);
    d.setDate(now.getDate() + offset);
    chips.push({
      label: DAY[d.getDay()],
      val: offset === 0 ? 'today' : `+${offset}d`,
      isToday: offset === 0,
    });
  }

  chips.push(
    { label:'2wk', val:'2w',    isToday:false },
    { label:'1mo', val:'1m',    isToday:false },
    { label:'Custom…', val:'custom', isToday:false },
  );
  return chips;
}

function renderWhenChips() {
  whenChipsData = buildWhenChips();
  const container = document.getElementById('when-btns');
  container.innerHTML = whenChipsData.map(chip => {
    const cls = ['recur-btn'];
    if (chip.val === 'none') cls.push('active');
    if (chip.isToday) cls.push('today-chip');
    return `<button class="${cls.join(' ')}" data-when="${chip.val}" onclick="setWhen('${chip.val}',this)">${chip.label}</button>`;
  }).join('');
}

function setWhen(when, btn) {
  currentWhen = when;
  document.querySelectorAll('.when-btns .recur-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const customEl = document.getElementById('custom-when');
  if (when === 'custom') {
    customEl.classList.add('show');
    const today = new Date().toISOString().split('T')[0];
    const inp = document.getElementById('custom-when-date');
    inp.min = today;
    if (!inp.value) inp.value = today;
  } else {
    customEl.classList.remove('show');
  }
}

function onCustomWhenChange() { currentWhen = 'custom'; }

function getWhenValue() {
  if (currentWhen === 'none') return { due_date: null, due_month: null };
  if (currentWhen === 'custom') {
    const val = document.getElementById('custom-when-date').value;
    if (!val) return { due_date: null, due_month: null };
    const d = new Date(val + 'T12:00:00');
    return { due_date: val, due_month: d.toLocaleString('en-US',{month:'long'}).toLowerCase() };
  }
  const d = new Date(); d.setHours(12,0,0,0);
  if (currentWhen === 'today') { /* d = today */ }
  else if (currentWhen === '2w') { d.setDate(d.getDate()+14); }
  else if (currentWhen === '1m') { d.setMonth(d.getMonth()+1); }
  else if (/^\+\d+d$/.test(currentWhen)) { d.setDate(d.getDate() + parseInt(currentWhen.slice(1,-1))); }
  return { due_date: d.toISOString().split('T')[0], due_month: d.toLocaleString('en-US',{month:'long'}).toLowerCase() };
}

function whenLabel() {
  if (currentWhen === 'none') return '';
  if (currentWhen === 'custom') {
    const val = document.getElementById('custom-when-date').value;
    if (!val) return '';
    return new Date(val+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }
  const chip = whenChipsData.find(c => c.val === currentWhen);
  return chip ? chip.label : currentWhen;
}

// ── Recurring ─────────────────────────────────────────────────
function setRecur(recur, btn) {
  currentRecur = recur;
  document.querySelectorAll('.recur-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('custom-recur').classList.toggle('show', recur === 'custom');
}

function getRecurValue() {
  if (currentRecur === 'none') return null;
  if (currentRecur === 'custom') {
    const n = parseInt(document.getElementById('custom-n').value) || 1;
    const unit = document.getElementById('custom-unit').value;
    return { every: n, unit };
  }
  return currentRecur;
}

function recurLabel() {
  if (currentRecur === 'none') return null;
  if (currentRecur === 'custom') {
    const n = parseInt(document.getElementById('custom-n').value) || 1;
    const unit = document.getElementById('custom-unit').value;
    return `every ${n} ${unit}`;
  }
  return currentRecur;
}

// ── Placeholder ───────────────────────────────────────────────
function updatePlaceholder() {
  const ta = document.getElementById('content');
  const ph = {
    observation: 'Brain dump with multiple actions — Claude will auto-extract tasks.',
    note: 'Capture context, meeting notes, decisions… no tasks will be created.',
    task: 'What needs to get done? (e.g. "Buy food for Lizzie", "Call Rebecca")',
  };
  ta.placeholder = ph[currentType] || "What's on your mind?";
}

// ── Keyword detection ─────────────────────────────────────────
const TYPE_KW  = ['task','note','observation'];
const SCOPE_KW = ['me','my'];
const RECUR_KW = { weekly:'weekly', biweekly:'biweekly', monthly:'monthly', daily:'daily' };
const WHEN_KW  = { 'today':'today', 'tonight':'today', 'tomorrow':'tomorrow', 'friday':'this-fri', 'monday':'next-mon' };

function detectKeywords(text) {
  const lower = text.toLowerCase().trimStart();
  let detectedScope = null, detectedType = null, detectedRecur = null, detectedWhen = null;
  let s = lower;
  for (const sk of SCOPE_KW) {
    if (s.startsWith(sk+' ')||s.startsWith(sk+'\n')) { detectedScope='personal'; s=s.slice(sk.length).trimStart(); break; }
  }
  for (const tk of TYPE_KW) {
    if (s.startsWith(tk+' ')||s.startsWith(tk+'\n')||s===tk) { detectedType=tk; s=s.slice(tk.length).trimStart(); break; }
  }
  for (const [kw, val] of Object.entries(RECUR_KW)) {
    if (s.includes(kw)) { detectedRecur=val; break; }
  }
  for (const [kw, val] of Object.entries(WHEN_KW)) {
    if (s.includes(kw)) { detectedWhen=val; break; }
  }
  return { detectedScope, detectedType, detectedRecur, detectedWhen };
}

function applyKeywordOverrides(text) {
  const { detectedScope, detectedType, detectedRecur, detectedWhen } = detectKeywords(text);
  const ind = document.getElementById('override-indicator');
  const parts = [];
  if (detectedScope) { setScope(detectedScope); parts.push('Scope: Me'); }
  if (detectedType)  { setType(detectedType, document.querySelector(`.type-btn[data-type="${detectedType}"]`)); parts.push(`Type: ${detectedType}`); }
  if (detectedWhen && currentType === 'task')  { setWhen(detectedWhen, document.querySelector(`.recur-btn[data-when="${detectedWhen}"]`)); parts.push(`Due: ${detectedWhen}`); }
  if (detectedRecur) { setRecur(detectedRecur, document.querySelector(`.recur-btn[data-recur="${detectedRecur}"]`)); parts.push(`Repeats: ${detectedRecur}`); }
  if (parts.length) { ind.textContent = '⌨ Override — '+parts.join(', '); ind.style.display='block'; }
  else ind.style.display='none';
}

function stripKeywordPrefix(text) {
  let t = text.trimStart();
  for (const sk of SCOPE_KW) {
    if (t.toLowerCase().startsWith(sk+' ')||t.toLowerCase().startsWith(sk+'\n')) { t=t.slice(sk.length).trimStart(); break; }
  }
  for (const tk of TYPE_KW) {
    const l=t.toLowerCase();
    if (l.startsWith(tk+' ')||l.startsWith(tk+'\n')) { t=t.slice(tk.length).trimStart(); break; }
  }
  return t.trim();
}

// ── Voice (Deepgram Nova-2) ───────────────────────────────────
function getBestMimeType() {
  // Try types in order — Android needs ogg or plain webm, iOS needs mp4
  const types = [
    'audio/webm;codecs=opus',
    'audio/ogg;codecs=opus',
    'audio/webm',
    'audio/ogg',
    'audio/mp4',
  ];
  for (const t of types) {
    try { if (MediaRecorder.isTypeSupported(t)) return t; } catch {}
  }
  return ''; // let browser choose
}

async function toggleMic() {
  const micBtn = document.getElementById('mic-btn');

  // Stop recording if active
  if (isRecording) {
    mediaRecorder?.stop();
    return;
  }

  if (!KEY) { showToast('No key in URL','error'); return; }

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch {
    showToast('Microphone access denied','error');
    return;
  }

  audioChunks = [];
  const mimeType = getBestMimeType();

  try {
    mediaRecorder = mimeType
      ? new MediaRecorder(stream, { mimeType })
      : new MediaRecorder(stream); // let browser pick
  } catch {
    // Construction failed — fall back to no options
    try { mediaRecorder = new MediaRecorder(stream); }
    catch { showToast('Recording not supported on this device','error'); stream.getTracks().forEach(t => t.stop()); return; }
  }

  const actualMime = mediaRecorder.mimeType || mimeType || 'audio/webm';

  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) audioChunks.push(e.data);
  };

  mediaRecorder.onstop = async () => {
    isRecording = false;
    micBtn.classList.remove('recording');
    micBtn.classList.add('processing');
    stream.getTracks().forEach(t => t.stop());

    try {
      const blob = new Blob(audioChunks, { type: actualMime });
      const res  = await fetch(`${API_BASE}/transcribe?key=${encodeURIComponent(KEY)}`, {
        method: 'POST',
        headers: { 'Content-Type': actualMime },
        body: blob,
      });
      const data = await res.json();
      if (data.transcript) {
        const ta = document.getElementById('content');
        const existing = ta.value.trim();
        ta.value = existing ? existing + ' ' + data.transcript : data.transcript;
        applyKeywordOverrides(ta.value);
      } else {
        showToast('No speech detected — try again','error');
      }
    } catch {
      showToast('Transcription failed — try again','error');
    } finally {
      micBtn.classList.remove('processing');
    }
  };

  mediaRecorder.start();
  isRecording = true;
  micBtn.classList.add('recording');
}

// ── Capture ───────────────────────────────────────────────────
async function capture() {
  const rawContent = document.getElementById('content').value.trim();
  if (!rawContent) { showToast('Please enter something first.','error'); return; }
  if (!KEY) { showToast('No key in URL — add ?key=YOUR_KEY','error'); return; }

  const content = stripKeywordPrefix(rawContent);
  const recurVal = getRecurValue();
  const { due_date, due_month } = getWhenValue();

  const btn = document.getElementById('capture-btn');
  btn.disabled=true;
  btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="32"><animate attributeName="stroke-dashoffset" values="32;0;32" dur="1.2s" repeatCount="indefinite"/></circle></svg> Saving…';

  try {
    const body = { content, key: KEY, save_as: currentType, scope: currentScope };
    if (recurVal)       body.recurring     = recurVal;
    if (due_date)       body.due_date      = due_date;
    if (due_month)      body.due_month     = due_month;
    if (currentTier)    body.tier_override = currentTier;
    const cat = document.getElementById('category-select').value;
    if (cat)            body.category      = cat;

    const res = await fetch(`${API_BASE}/quick-capture`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error||'Server error');

    document.getElementById('content').value='';
    document.getElementById('override-indicator').style.display='none';

    const typeLabels = { task:'Task saved', note:'Note saved', observation:'Observation saved' };
    let msg = '✓ '+(typeLabels[currentType]||'Saved');
    if (due_date)  msg += ` — due ${whenLabel()}`;
    if (recurVal)  msg += ` — repeats ${recurLabel()}`;
    let taskHtml='';
    if (currentType==='observation'&&data.tasks?.length) {
      msg+=` — ${data.tasks_extracted} task${data.tasks_extracted!==1?'s':''} extracted`;
      taskHtml=`<ul class="task-list">${data.tasks.map(t=>`<li>${esc(t)}</li>`).join('')}</ul>`;
    }
    showToast(msg+taskHtml,'success');
    loadRecent();

    // Reset after capture
    setRecur('none', document.querySelector('.recur-btn[data-recur="none"]'));
    setWhen('none', document.querySelector('.when-btns .recur-btn[data-when="none"]'));
    document.getElementById('custom-when-date').value = '';
    document.getElementById('custom-when').classList.remove('show');
    currentTier = 0;
    document.querySelectorAll('#priority-row .recur-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('category-select').value = '';

  } catch(e) {
    showToast('Error: '+e.message,'error');
  } finally {
    btn.disabled=false;
    btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg> Capture';
  }
}

// ── Recent ────────────────────────────────────────────────────
async function loadRecent() {
  try {
    const res = await fetch(`${API_BASE}/brain-priorities?key=${encodeURIComponent(KEY)}`);
    if (!res.ok) return;
    const data = await res.json();
    const list = document.getElementById('recent-list');
    if (data.business_count!==undefined) {
      list.innerHTML=`<div style="font-size:12px;color:var(--text-faint);padding:6px 0;">${data.business_count} business · ${data.personal_count} personal thoughts in brain</div>`;
    }
  } catch { /* silent */ }
}

function showToast(msg, type) {
  const t=document.getElementById('toast');
  t.innerHTML=msg; t.className=`toast show ${type}`;
  if (type==='success') setTimeout(()=>t.classList.remove('show'),5000);
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Init ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  updatePlaceholder();
  renderWhenChips(); // build day chips based on today
  loadRecent();
  const ta=document.getElementById('content');
  ta.addEventListener('input',()=>applyKeywordOverrides(ta.value));
  ta.addEventListener('keydown',(e)=>{ if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){e.preventDefault();capture();} });
});
</script>
