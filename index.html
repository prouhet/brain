<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>Brain</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    padding: 16px 20px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #8b8bf5;
  }

  .header .count {
    font-size: 13px;
    color: #666;
  }

  .input-area {
    flex: 1;
    padding: 8px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  #thought {
    flex: 1;
    background: #16213e;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 16px;
    font-size: 17px;
    line-height: 1.5;
    color: #e0e0e0;
    resize: none;
    outline: none;
    font-family: inherit;
  }

  #thought:focus {
    border-color: #8b8bf5;
  }

  #thought::placeholder {
    color: #555;
  }

  .controls {
    display: flex;
    gap: 10px;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:active {
    transform: scale(0.97);
  }

  .btn-capture {
    background: #8b8bf5;
    color: #fff;
  }

  .btn-capture:disabled {
    background: #444;
    color: #666;
  }

  .btn-mic {
    flex: 0 0 56px;
    background: #16213e;
    border: 1px solid #333;
    color: #e0e0e0;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn-mic.listening {
    background: #5c2a2a;
    border-color: #e74c3c;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .status {
    text-align: center;
    font-size: 14px;
    min-height: 20px;
    padding: 0 20px;
    transition: all 0.3s;
  }

  .status.success { color: #4ecdc4; }
  .status.error { color: #e74c3c; }
  .status.working { color: #f39c12; }

  .hint {
    text-align: center;
    font-size: 12px;
    color: #444;
    padding: 0 20px 16px;
  }

  .history {
    max-height: 30vh;
    overflow-y: auto;
    padding: 0 20px 16px;
  }

  .history-item {
    background: #16213e;
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 8px;
    font-size: 14px;
    line-height: 1.4;
  }

  .history-item .meta {
    font-size: 11px;
    color: #666;
    margin-top: 4px;
  }

  .scope-badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
  }

  .scope-business { background: #2d4a3e; color: #4ecdc4; }
  .scope-personal { background: #4a2d4a; color: #c49cde; }
</style>
</head>
<body>

<div class="header">
  <h1>Studio Strong Brain</h1>
  <span class="count" id="sessionCount"></span>
</div>

<div class="input-area">
  <textarea
    id="thought"
    placeholder="Type or tap mic to speak...

Just type = business brain
me: ... = personal"
    autofocus
  ></textarea>

  <div class="controls">
    <button class="btn btn-mic" id="micBtn" title="Voice input">🎙</button>
    <button class="btn btn-capture" id="captureBtn" disabled>Capture</button>
  </div>
</div>

<div class="status" id="status"></div>
<div class="hint">Type a thought and hit Capture. Start with <strong>me:</strong> for personal.</div>

<div class="history" id="history"></div>

<script>
// --- CONFIG ---
// The key is passed as a URL parameter: ?key=YOUR_KEY
const params = new URLSearchParams(window.location.search);
const KEY = params.get('key') || '';
const API_BASE = 'https://rzkrydqtgmuyeaipronh.supabase.co/functions/v1/quick-capture';

const thought = document.getElementById('thought');
const captureBtn = document.getElementById('captureBtn');
const micBtn = document.getElementById('micBtn');
const status = document.getElementById('status');
const history = document.getElementById('history');
const sessionCount = document.getElementById('sessionCount');

let count = 0;

// Enable/disable capture button
thought.addEventListener('input', () => {
  captureBtn.disabled = !thought.value.trim();
});

// Enter to capture (shift+enter for newline)
thought.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (thought.value.trim()) capture();
  }
});

captureBtn.addEventListener('click', capture);

async function capture() {
  const text = thought.value.trim();
  if (!text) return;

  captureBtn.disabled = true;
  setStatus('Capturing...', 'working');

  try {
    const res = await fetch(`${API_BASE}?key=${KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });

    const data = await res.json();

    if (!res.ok) {
      setStatus(data.error || 'Failed', 'error');
      captureBtn.disabled = false;
      return;
    }

    count++;
    sessionCount.textContent = `${count} this session`;
    setStatus(`Captured as ${data.type} [${data.scope}]`, 'success');
    addToHistory(text, data);
    thought.value = '';
    captureBtn.disabled = true;

    // Clear status after 3 seconds
    setTimeout(() => setStatus(''), 3000);

  } catch (err) {
    setStatus('Network error — check connection', 'error');
    captureBtn.disabled = false;
  }
}

function setStatus(msg, type = '') {
  status.textContent = msg;
  status.className = 'status' + (type ? ' ' + type : '');
}

function addToHistory(text, data) {
  const div = document.createElement('div');
  div.className = 'history-item';

  const scopeClass = data.scope === 'personal' ? 'scope-personal' : 'scope-business';
  const isPersonal = text.match(/^me[\s:]/i);
  const displayText = isPersonal ? text.replace(/^me[\s:]+/i, '') : text;

  div.innerHTML = `
    ${displayText}
    <div class="meta">
      <span class="scope-badge ${scopeClass}">${data.scope}</span>
      ${data.type} ${data.topics ? '— ' + data.topics : ''}
    </div>
  `;
  history.prepend(div);
}

// --- Voice Input (Web Speech API) ---
let recognition = null;
let isListening = false;

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (e) => {
    let transcript = '';
    for (let i = 0; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    thought.value = transcript;
    captureBtn.disabled = !transcript.trim();
  };

  recognition.onend = () => {
    isListening = false;
    micBtn.classList.remove('listening');
    // Auto-capture if we got text
    if (thought.value.trim()) {
      capture();
    }
  };

  recognition.onerror = (e) => {
    isListening = false;
    micBtn.classList.remove('listening');
    if (e.error !== 'no-speech') {
      setStatus('Mic error: ' + e.error, 'error');
    }
  };

  micBtn.addEventListener('click', () => {
    if (isListening) {
      recognition.stop();
    } else {
      thought.value = '';
      recognition.start();
      isListening = true;
      micBtn.classList.add('listening');
      setStatus('Listening...', 'working');
    }
  });
} else {
  // No speech API — hide mic, use keyboard voice instead
  micBtn.style.display = 'none';
}

// Check for key
if (!KEY) {
  setStatus('Missing key — add ?key=YOUR_KEY to the URL', 'error');
  captureBtn.disabled = true;
  thought.disabled = true;
}
</script>

</body>
</html>
